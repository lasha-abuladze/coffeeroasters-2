<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeeroasters</title>

    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./coffeeroasters.css">
</head>
<body>

    <header class="main-header container">
        
        <a class="company-logo-name" href="./index.html">
            <img class="company-logo-img" src="./assets/logo.svg" alt="coffeeroasters-logo">
            <span class="company-name">coffeeroasters</span>
        </a>

        <nav class="main-navigation display-none">
            <ul>
                <li><a href="#">home</a></li>
                <li><a href="#">about us</a></li>
                <li><a href="#">create your plan</a></li>                
            </ul>
        </nav>

        <div class="close-open-btns">
            <button class="btn-gen close-navigation-btn display-none">
                <img src="./assets/shared/mobile/icon-close.svg" alt="clsoe-icon">
            </button>

            <button class="btn-gen open-navigation-btn">
                <img src="./assets/shared/mobile/icon-hamburger.svg" alt="hamburger-icon">
            </button>
        </div>

    </header>

    <main class="main-section container">

        <!-- 
            S E C T I O N
            I N T R O D U C T I O N
        -->
        <section class="section-gen section-introduction">
            <h1>
                Great coffee <span>made simple.</span>
            </h1>
            <p>
                Start your mornings with the world’s best coffees. 
                Try our expertly curated artisan coffees from our 
                best roasters delivered directly to your door, at your schedule.
            </p>

            <!-- 
                btn-gen and btn-create-plane have there styles in scss
                outside of a styles conainer..  in general styles
            -->

            <button class="btn-gen btn-create-plan">
                Create your plan
            </button>
        </section>

        <!-- 
            O U R 
            C O L L E C T I O N 
        -->
        <section class="section-gen section-our-collection">


            <!-- 
                I use header tag becaus h2 needs a gradient to create fade effect
                so header is just a container here for h2 and gradient div
            -->

            <header class="section-header">
                <h2>
                    our collection
                </h2>

                <div class="gradient"></div>
            </header>

            <div class="product-list">

                <figure class="product product-gran-espresso">
                    <img class="product-img" src="./assets/home/desktop/image-gran-espresso.png" alt="gran-espresso">
                    <figcaption>
                        <h3 class="product-name">Gran Espresso</h3>
                        <p class="about-product">
                            Light and flavorful blend with cocoa and 
                            black pepper for an intense experience
                        </p>
                    </figcaption>
                </figure>

                <figure class="product product-planalto">
                    <img class="product-img" src="./assets/home/desktop/image-planalto.png" alt="planalto">
                    <figcaption>
                        <h3 class="product-name">Planalto</h3>
                        <p class="about-product">
                            Brazilian dark roast with rich and velvety body, 
                            and hints of fruits and nuts
                        </p>
                    </figcaption>
                </figure>

                <figure class="product product-piccolo">
                    <img class="product-img" src="./assets/home/desktop/image-piccollo.png" alt="piccolo">
                    <figcaption>
                        <h3 class="product-name">Piccolo</h3>
                        <p class="about-product">
                            Mild and smooth blend featuring notes 
                            of toasted almond and dried cherry 
                        </p>
                    </figcaption>
                </figure>

                <figure class="product product-danche">
                    <img class="product-img" src="./assets/home/desktop/image-danche.png" alt="image-danche">
                    <figcaption>
                        <h3 class="product-name">Danche</h3>
                        <p class="about-product">
                            Ethiopian hand-harvested blend densely 
                            packed with vibrant fruit notes
                        </p>
                    </figcaption>
                </figure>

            </div>

        </section>

    </main>


    <script src="./coffeeroasters.js"></script>

</body>
</html>
